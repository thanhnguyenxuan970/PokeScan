services:
  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: pokescan
      POSTGRES_PASSWORD: pokescan
      POSTGRES_DB: pokescan
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokescan"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  pgdata:
